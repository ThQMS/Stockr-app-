name: stockr_app
description: >-
  Stockr — offline-first inventory and stock-movement app for Flutter.
  QR/barcode scanning, local-first persistence with Drift and background
  synchronization with the Stockr API.
publish_to: none
version: 1.0.0+1
repository: https://github.com/ThQMS/Stockr-app-
homepage: https://github.com/ThQMS/Stockr-app-
issue_tracker: https://github.com/ThQMS/Stockr-app-/issues

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.4.0
  go_router: ^14.0.0
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  dio: ^5.5.0
  fpdart: ^1.1.0
  mobile_scanner: ^5.2.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  get_it: ^8.0.0
  injectable: ^2.4.0
  equatable: ^2.0.0
  dartz: ^0.10.0
  connectivity_plus: ^6.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0
  injectable_generator: ^2.4.0
  freezed: ^2.5.0
  freezed_annotation: ^2.4.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
