name: 🐛 Bug report
description: Report something that isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Tap '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / OS
      placeholder: "Pixel 7, Android 14 (or emulator)"
    validations:
      required: true
  - type: input
    id: flutter
    attributes:
      label: Flutter version
      placeholder: "output of `flutter --version`"
    validations:
      required: true
  - type: checkboxes
    id: connectivity
    attributes:
      label: Connectivity
      options:
        - label: It happens offline
        - label: It happens online
        - label: It happens during sync
